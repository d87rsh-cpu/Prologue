<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Prologue</title>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1A1A2E;color:#00B4D8;font-family:system-ui,sans-serif;">
        <p>Loading…</p>
      </div>
    </div>
    <script type="module">
      (function () {
        const root = document.getElementById('root');
        function showError(title, err) {
          const msg = (err && (err.message || err.stack || err)) || String(err);
          root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1A1A2E;color:#E94560;font-family:system-ui,sans-serif;padding:24;box-sizing:border-box"><div style="max-width:600px;text-align:center"><p style="font-weight:600;margin-bottom:12px">' + (title || 'Failed to load') + '</p><pre style="font-size:12px;color:#A0A0B0;text-align:left;overflow:auto;white-space:pre-wrap;word-break:break-word">' + (msg.replace(/</g, '&lt;').replace(/>/g, '&gt;')) + '</pre></div></div>';
        }
        import('/src/main.jsx').catch(function (err) {
          console.error('App load error', err);
          showError('App failed to load (see console for details)', err);
        });
      })();
    </script>
  </body>
</html>
